# The Aperio server to dial out to, and the token that authorizes this client.
# The token must match `server_token` in aperio-server.yaml.
server:
  url: https://tunnel.example.com
  token: apr_simple_change_me

# The local backend every proxied request is forwarded to.
# A bare port (`3000`) or hostname (`example.com`) is normalized to a URL.
target: http://localhost:3000
