server:
  url: https://tunnel.example.com
  token: apr_services_change_me

# Several backends from one client, one tunnel connection per entry.
# Per-entry fields override the top-level ones; binds are strictly per entry.
services:
  - name: web                       # label in client logs and the dashboard
    target: http://localhost:3000
    hostname: app.example.com
    target_health: /health          # probe the backend, leave rotation when down

  - name: api
    target: http://localhost:4000
    hostname: api.example.com
    max_concurrent: 8               # server queues the excess instead of flooding

  - name: docs
    target: http://localhost:5000
    path: /docs                     # path bind; the prefix is stripped by default
