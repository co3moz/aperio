name: Rust CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  check:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check code formatting
        run: cargo fmt --all --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run automated tests
        run: cargo test --all

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Line/region coverage of the whole workspace via rustc's LLVM
      # source-based instrumentation, merging the unit tests AND the E2E
      # integration run into one report: `show-env` points CARGO_TARGET_DIR
      # at the instrumented build, which tests/e2e.sh picks up, and the
      # server/client write their profile data on the graceful SIGTERM
      # exit — so the tunnel/proxy runtime paths count too. Reported, not
      # gated: the table lands in the job summary, the full HTML report as
      # a downloadable artifact.
      - name: Measure coverage (unit tests + e2e)
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace
          cargo test --workspace
          cargo build -p aperio-server -p aperio-client
          bash tests/e2e.sh
          cargo llvm-cov report --html --output-dir coverage-html
          echo '## Coverage (unit tests + e2e)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-html
            lcov.info
          retention-days: 30

  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # Scans Cargo.lock against the RustSec advisory database. Fails the
      # build on known vulnerabilities in the dependency tree.
      - name: Audit dependencies
        run: cargo audit

  e2e:
    name: End-to-End Tunnel Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build server and client binaries
        run: cargo build -p aperio-server -p aperio-client

      # Real integration test: aperio-server + aperio-client + mock backend,
      # exercising proxying, dashboard APIs, and the programmatic tunnels API.
      - name: Run E2E integration test
        run: bash tests/e2e.sh

  docker-amd:
    name: Build & Push Docker AMD64
    runs-on: ubuntu-latest
    needs: [check, e2e]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - image: aperio-server
            dockerfile: ./aperio-server/Dockerfile
          - image: aperio-client
            dockerfile: ./aperio-client/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          flavor: |
            suffix=-amd64
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-amd64

  docker-arm:
    name: Build & Push Docker ARM64
    runs-on: ubuntu-24.04-arm
    needs: [check, e2e]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - image: aperio-server
            dockerfile: ./aperio-server/Dockerfile
          - image: aperio-client
            dockerfile: ./aperio-client/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          flavor: |
            suffix=-arm64
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-arm64

  merge-manifests:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: [docker-amd, docker-arm]
    if: github.event_name == 'push'
    strategy:
      matrix:
        image: [aperio-server, aperio-client]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and Push Multi-Arch Tags
        run: |
          BASE_IMG="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          BRANCH_NAME="${{ github.ref_name }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          if [ "${BRANCH_NAME}" = "main" ] || [ "${BRANCH_NAME}" = "master" ]; then
            docker buildx imagetools create --tag ${BASE_IMG}:latest \
              ${BASE_IMG}:latest-amd64 \
              ${BASE_IMG}:latest-arm64
          fi

          docker buildx imagetools create --tag ${BASE_IMG}:${BRANCH_NAME} \
            ${BASE_IMG}:${BRANCH_NAME}-amd64 \
            ${BASE_IMG}:${BRANCH_NAME}-arm64

          docker buildx imagetools create --tag ${BASE_IMG}:${SHORT_SHA} \
            ${BASE_IMG}:${SHORT_SHA}-amd64 \
            ${BASE_IMG}:${SHORT_SHA}-arm64
