name: Release

# Tag a version (e.g. `git tag v0.2.0 && git push --tags`) and this workflow
# builds prebuilt binaries for every supported platform, attaches them to a
# GitHub Release, and publishes the multi-arch Docker images. Asset names are
# versionless so install.sh can always use the stable
# `releases/latest/download/...` URLs. The Docker images reuse the Linux musl
# binaries this same run already built (see the `docker` job) instead of
# recompiling the Rust code a second time.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  actions: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Windows Defender real-time scanning of every .obj the vendored OpenSSL C
      # build emits is a large, silent tax on this job. Exclude the build dirs
      # before anything writes to them. Best-effort: never fail the build if the
      # runner ever drops the admin rights Add-MpPreference needs.
      - name: Exclude build dirs from Defender (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "cl.exe","link.exe","rustc.exe","cargo.exe","nasm.exe","perl.exe" -ErrorAction SilentlyContinue

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # vendored-openssl: webauthn-rs pulls in openssl, and the release
      # matrix cross-compiles (x86_64 on arm64 macs, musl static) where no
      # system OpenSSL exists for the target — build it from source instead.
      - name: Build release binaries
        run: cargo build --release --locked -p aperio-server -p aperio-client --target ${{ matrix.target }} --features aperio-server/vendored-openssl

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-pkg
          for bin in aperio-client aperio-server; do
            tar -C "target/${{ matrix.target }}/release" -czf "dist-pkg/${bin}-${{ matrix.target }}.tar.gz" "${bin}"
            (cd dist-pkg && shasum -a 256 "${bin}-${{ matrix.target }}.tar.gz" > "${bin}-${{ matrix.target }}.tar.gz.sha256")
          done

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-pkg | Out-Null
          foreach ($bin in "aperio-client","aperio-server") {
            Compress-Archive -Path "target/${{ matrix.target }}/release/$bin.exe" -DestinationPath "dist-pkg/$bin-${{ matrix.target }}.zip"
            $hash = (Get-FileHash "dist-pkg/$bin-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
            "$hash  $bin-${{ matrix.target }}.zip" | Out-File -Encoding ascii "dist-pkg/$bin-${{ matrix.target }}.zip.sha256"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.target }}
          path: dist-pkg/*
          # Only needed for the release job in this same run — keep storage low.
          retention-days: 1

  schema:
    name: Generate config schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Two copies of the same schema: a versioned one for pinning, and a
      # versionless one so schema managers (editor yaml.schemas, SchemaStore,
      # $schema references) get a stable URL that always serves the latest:
      # releases/latest/download/aperio-client.schema.json
      - name: Generate config schemas (versioned + stable names)
        run: |
          mkdir -p dist-pkg
          cargo run --locked -p aperio-config > "dist-pkg/aperio-client.${GITHUB_REF_NAME}.json"
          cp "dist-pkg/aperio-client.${GITHUB_REF_NAME}.json" dist-pkg/aperio-client.schema.json
          cargo run --locked -p aperio-config -- --server > "dist-pkg/aperio-server.${GITHUB_REF_NAME}.json"
          cp "dist-pkg/aperio-server.${GITHUB_REF_NAME}.json" dist-pkg/aperio-server.schema.json

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-schema
          path: dist-pkg/*
          retention-days: 1

  # Publish the multi-arch (amd64+arm64) images straight from the musl-static
  # binaries the `build` matrix already produced — the Dockerfiles just copy the
  # right binary in, so nothing is compiled twice. One buildx build per image
  # emits the multi-arch manifest directly (the COPY-only images make the small
  # cross-arch emulation for `apk add ca-certificates` negligible).
  docker:
    name: Build & Push Docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [aperio-server, aperio-client]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Only the two Linux musl artifacts are needed for the images; they are
      # merged into ./pkg/ regardless of which build-matrix job produced them.
      - name: Download prebuilt Linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: pkg-*-linux-musl
          path: pkg
          merge-multiple: true

      # The Dockerfile copies dist-docker/<image>-<TARGETARCH>; TARGETARCH is
      # Docker's arch name (amd64/arm64), so map the Rust target triples to it.
      - name: Stage binaries by Docker arch
        run: |
          set -euo pipefail
          mkdir -p dist-docker
          tar -xzf "pkg/${{ matrix.image }}-x86_64-unknown-linux-musl.tar.gz" -C dist-docker
          mv "dist-docker/${{ matrix.image }}" "dist-docker/${{ matrix.image }}-amd64"
          tar -xzf "pkg/${{ matrix.image }}-aarch64-unknown-linux-musl.tar.gz" -C dist-docker
          mv "dist-docker/${{ matrix.image }}" "dist-docker/${{ matrix.image }}-arm64"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Tags: the exact ref (v0.2.0), the semver forms (0.2.0 / 0.2 / 0), and
      # `latest`. `latest=auto` + the semver patterns are skipped for a
      # pre-release tag (e.g. v1.0.0-rc1), which then only gets its exact tag.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          flavor: latest=auto
          tags: |
            type=raw,value=${{ github.ref_name }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.image }}/Dockerfile.workflow
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, schema]
    steps:
      # `actions/download-artifact` intermittently fails ("Artifact download
      # failed after 5 retries") on GitHub's artifact backend. Pull the run's
      # artifacts with the gh CLI and retry a few times so a transient hiccup
      # doesn't publish a release with no assets. Each artifact lands under
      # dist-pkg/<artifact-name>/.
      - name: Download release assets (with retry)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist-pkg
          ok=0
          for attempt in 1 2 3 4 5; do
            if gh run download "${{ github.run_id }}" --repo "${{ github.repository }}" --dir dist-pkg; then
              ok=1
              echo "Downloaded artifacts on attempt ${attempt}"
              break
            fi
            echo "Attempt ${attempt} failed; retrying in 15s..."
            sleep 15
          done
          if [ "${ok}" -ne 1 ]; then
            echo "::error::Failed to download run artifacts after 5 attempts"
            exit 1
          fi
          ls -R dist-pkg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-pkg/**/*
          generate_release_notes: true
