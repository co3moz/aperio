name: Release

# Tag a version (e.g. `git tag v0.2.0 && git push --tags`) and this workflow
# builds prebuilt binaries for every supported platform and attaches them to
# a GitHub Release. Asset names are versionless so install.sh can always use
# the stable `releases/latest/download/...` URLs.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked -p aperio-server -p aperio-client --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist-pkg
          for bin in aperio-client aperio-server; do
            tar -C "target/${{ matrix.target }}/release" -czf "dist-pkg/${bin}-${{ matrix.target }}.tar.gz" "${bin}"
            (cd dist-pkg && shasum -a 256 "${bin}-${{ matrix.target }}.tar.gz" > "${bin}-${{ matrix.target }}.tar.gz.sha256")
          done

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist-pkg | Out-Null
          foreach ($bin in "aperio-client","aperio-server") {
            Compress-Archive -Path "target/${{ matrix.target }}/release/$bin.exe" -DestinationPath "dist-pkg/$bin-${{ matrix.target }}.zip"
            $hash = (Get-FileHash "dist-pkg/$bin-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
            "$hash  $bin-${{ matrix.target }}.zip" | Out-File -Encoding ascii "dist-pkg/$bin-${{ matrix.target }}.zip.sha256"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.target }}
          path: dist-pkg/*

  schema:
    name: Generate config schema
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate versioned aperio.yaml schema
        run: |
          mkdir -p dist-pkg
          cargo run --locked -p aperio-config > "dist-pkg/aperio-client.${GITHUB_REF_NAME}.json"

      - name: Upload schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-schema
          path: dist-pkg/*

  # Docker images are built only on a version tag (not on every push). Each
  # arch is built natively (arm64 on an ARM runner, no slow QEMU) and pushed
  # under a per-arch tag; merge-docker then stitches them into the final
  # multi-arch manifests.
  docker-amd:
    name: Build & Push Docker AMD64
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: aperio-server
            dockerfile: ./aperio-server/Dockerfile
          - image: aperio-client
            dockerfile: ./aperio-client/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          flavor: suffix=-amd64
          tags: type=raw,value=${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-amd64
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-amd64

  docker-arm:
    name: Build & Push Docker ARM64
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        include:
          - image: aperio-server
            dockerfile: ./aperio-server/Dockerfile
          - image: aperio-client
            dockerfile: ./aperio-client/Dockerfile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          flavor: suffix=-arm64
          tags: type=raw,value=${{ github.ref_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-arm64

  merge-docker:
    name: Create Multi-Arch Manifests
    runs-on: ubuntu-latest
    needs: [docker-amd, docker-arm]
    strategy:
      matrix:
        image: [aperio-server, aperio-client]
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Publish the multi-arch tags for this release: the exact version tag
      # always, plus semver (0.2.0 / 0.2 / 0) and `latest` for a stable
      # release. A pre-release (a tag with a `-suffix`, e.g. v1.0.0-rc1) only
      # gets its exact tag, so `latest` keeps pointing at the last stable one.
      - name: Create and push multi-arch tags
        run: |
          set -euo pipefail
          BASE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}"
          REF="${{ github.ref_name }}"        # e.g. v0.2.0
          SEMVER="${REF#v}"                    # e.g. 0.2.0

          TAGS=("$REF")
          if [[ "$SEMVER" != *-* ]]; then
            [ "$SEMVER" != "$REF" ] && TAGS+=("$SEMVER")
            TAGS+=("${SEMVER%.*}" "${SEMVER%%.*}" "latest")
          fi

          for TAG in "${TAGS[@]}"; do
            echo "Tagging ${BASE}:${TAG}"
            docker buildx imagetools create --tag "${BASE}:${TAG}" \
              "${BASE}:${REF}-amd64" \
              "${BASE}:${REF}-arm64"
          done

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build, schema]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-pkg
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-pkg/*
          generate_release_notes: true
