name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check code formatting
        run: cargo fmt --all --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run automated tests
        run: cargo test --all

      # Guards against i18n drift: duplicate or stale (no-longer-used) keys in
      # any language dictionary fail the build; cross-language gaps are reported.
      - name: Check dashboard i18n key coverage & run unit tests
        working-directory: aperio-dashboard
        run: |
          npm ci
          npm run check-i18n
          npm run test

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Line/region coverage of the whole workspace via rustc's LLVM
      # source-based instrumentation, merging the unit tests AND the E2E
      # integration run into one report: `show-env` points CARGO_TARGET_DIR
      # at the instrumented build, which tests/e2e.sh picks up, and the
      # server/client write their profile data on the graceful SIGTERM
      # exit — so the tunnel/proxy runtime paths count too. Reported, not
      # gated: the table lands in the job summary, the full HTML report as
      # a downloadable artifact.
      - name: Measure coverage (unit tests + e2e)
        # Test-only scaffolding (`*_tests.rs`, the shared `test_support.rs`
        # fixture) is excluded from the report — it is not shipped code and
        # should not count towards or dilute the per-file coverage numbers.
        env:
          COV_IGNORE: (_tests|test_support)\.rs$
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace
          # --no-fail-fast so a single failing/flaky test cannot abort the run
          # before later crates' tests emit their profraw (which would silently
          # understate coverage). The real pass/fail gate is the `build` job.
          cargo test --workspace --no-fail-fast
          cargo build -p aperio-server -p aperio-client
          bash tests/e2e.sh
          cargo llvm-cov report --html --output-dir coverage-html --ignore-filename-regex "$COV_IGNORE"
          echo '## Coverage (unit tests + e2e)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only --ignore-filename-regex "$COV_IGNORE" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex "$COV_IGNORE"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-html
            lcov.info
          retention-days: 30

  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Prebuilt binary instead of `cargo install` (no multi-minute compile).
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Cache the RustSec advisory database between runs; a stale copy is
      # refreshed by cargo-audit's own git pull, so a weekly key is plenty.
      - name: Cache advisory database
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: advisory-db-

      # Scans Cargo.lock against the RustSec advisory database. Fails the
      # build on known vulnerabilities in the dependency tree.
      - name: Audit dependencies
        run: cargo audit

  bench:
    name: Benchmarks (report)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Runs the criterion hot-path micro-benchmarks with a short measurement
      # window: it catches a bench that stops compiling and surfaces the timings
      # in the job log. Reported, not gated — a hard regression threshold needs
      # a persisted baseline, which is intentionally out of scope here.
      - name: Run benchmarks
        run: cargo bench -p aperio-server --bench hot_paths -- --warm-up-time 1 --measurement-time 2

  fuzz:
    name: Protocol Fuzzing (smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-fuzz

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: fuzz

      # Short smoke run of each tunnel-protocol fuzz target: enough to catch a
      # parser panic introduced by a change without holding up the pipeline.
      #
      # --target is pinned to the gnu triple on purpose: install-action has no
      # cargo-fuzz binary of its own and falls back to cargo-binstall, which
      # installs the *musl* build. cargo-fuzz then defaults the fuzz target to
      # its own (musl) triple, which fails to build — musl std isn't installed
      # and ASan is incompatible with statically linked libc. Forcing gnu
      # (dynamic libc, std already present) sidesteps both.
      - name: Fuzz decode_binary_frame
        run: cargo fuzz run --target x86_64-unknown-linux-gnu binary_frame -- -max_total_time=30

      - name: Fuzz tunnel-message JSON/zlib decode
        run: cargo fuzz run --target x86_64-unknown-linux-gnu tunnel_message -- -max_total_time=30

  e2e:
    name: End-to-End Tunnel Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build server and client binaries
        run: cargo build -p aperio-server -p aperio-client

      # Real integration test: aperio-server + aperio-client + mock backend,
      # exercising proxying, dashboard APIs, and the programmatic tunnels API.
      - name: Run E2E integration test
        run: bash tests/e2e.sh

  # ---------------------------------------------------------------------------
  # Release-cache warming (Windows only).
  #
  # Every release target builds with vendored OpenSSL (a from-source C build),
  # but only the windows-msvc job is slow enough — and on a costly-enough
  # runner — for warming to pay off: on Linux/macOS the OpenSSL compile is
  # quick, Linux runners are cheap, and macOS runners bill at ~10x so warming
  # them would cost more than the release build ever saves. So we warm just
  # Windows and let the other targets build cold (as they always did).
  #
  # GitHub scopes each cache to the ref that wrote it, and a tag build can only
  # read its own + the default branch's caches, never another tag's — so
  # v0.4.0 could never reuse v0.3.0's cache. These jobs populate the Windows
  # cache on the default branch instead, where every future release tag *can*
  # read it. rust-cache stores only compiled dependencies (not the workspace
  # crates), so the expensive vendored-OpenSSL artifact is exactly what persists.
  #
  # Cost control: the Windows build only spins up when Cargo.lock / a Cargo.toml
  # actually changed — i.e. when the resolved dependency set, and thus the
  # cache, could differ. Ordinary code-only pushes skip it after a ~15s check.
  # A second lookup-only probe inside the job skips the rebuild entirely if the
  # cache key is nonetheless unchanged.
  # ---------------------------------------------------------------------------
  detect-deps-change:
    name: Detect dependency changes
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Warm only when the manifests that determine the resolved dependency set
      # (and hence rust-cache's key) changed in this push. An unknown/empty base
      # (e.g. a brand-new branch) falls through to warming, to be safe.
      - name: Did Cargo.lock / Cargo.toml change?
        id: filter
        run: |
          base='${{ github.event.before }}'
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$base" '${{ github.sha }}' | grep -qE '(^|/)Cargo\.(lock|toml)$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  warm-release-cache:
    name: Warm Windows release cache
    needs: detect-deps-change
    if: needs.detect-deps-change.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installed before the probe so the cache key hashes the same rustc the
      # release job uses; otherwise the probe would key on the image's default
      # rustc and never match.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cheap existence check (no download, no save). An exact hit means the
      # resolved deps + rustc are unchanged and there is nothing to rebuild.
      # `shared-key` matches release.yml's cache step for this target exactly.
      - name: Probe release cache
        id: probe
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-pc-windows-msvc
          lookup-only: true

      - name: Install Node.js (dashboard build)
        if: steps.probe.outputs.cache-hit != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Exclude build dirs from Defender
        if: steps.probe.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo" -ErrorAction SilentlyContinue
          Add-MpPreference -ExclusionProcess "cl.exe","link.exe","rustc.exe","cargo.exe","nasm.exe","perl.exe" -ErrorAction SilentlyContinue

      # Restores any partial cache and — the whole point — SAVES the fresh one
      # under the default-branch scope for release tag builds to reuse.
      - name: Restore & save dependency cache
        if: steps.probe.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: x86_64-pc-windows-msvc

      # Same command release.yml runs, so it compiles the identical dependency
      # set (vendored OpenSSL included) that the release build will then restore.
      - name: Build to populate cache
        if: steps.probe.outputs.cache-hit != 'true'
        run: cargo build --release --locked -p aperio-server -p aperio-client --target x86_64-pc-windows-msvc --features aperio-server/vendored-openssl
