name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check code formatting
        run: cargo fmt --all --check

      - name: Lint with Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run automated tests
        run: cargo test --all

      # Guards against i18n drift: duplicate or stale (no-longer-used) keys in
      # any language dictionary fail the build; cross-language gaps are reported.
      - name: Check dashboard i18n key coverage
        working-directory: aperio-dashboard
        run: |
          npm ci
          npm run check-i18n

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      # Line/region coverage of the whole workspace via rustc's LLVM
      # source-based instrumentation, merging the unit tests AND the E2E
      # integration run into one report: `show-env` points CARGO_TARGET_DIR
      # at the instrumented build, which tests/e2e.sh picks up, and the
      # server/client write their profile data on the graceful SIGTERM
      # exit — so the tunnel/proxy runtime paths count too. Reported, not
      # gated: the table lands in the job summary, the full HTML report as
      # a downloadable artifact.
      - name: Measure coverage (unit tests + e2e)
        run: |
          source <(cargo llvm-cov show-env --sh)
          cargo llvm-cov clean --workspace
          cargo test --workspace
          cargo build -p aperio-server -p aperio-client
          bash tests/e2e.sh
          cargo llvm-cov report --html --output-dir coverage-html
          echo '## Coverage (unit tests + e2e)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --summary-only >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage-html
            lcov.info
          retention-days: 30

  audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Prebuilt binary instead of `cargo install` (no multi-minute compile).
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      # Cache the RustSec advisory database between runs; a stale copy is
      # refreshed by cargo-audit's own git pull, so a weekly key is plenty.
      - name: Cache advisory database
        uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: advisory-db-

      # Scans Cargo.lock against the RustSec advisory database. Fails the
      # build on known vulnerabilities in the dependency tree.
      - name: Audit dependencies
        run: cargo audit

  e2e:
    name: End-to-End Tunnel Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js (dashboard build)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build server and client binaries
        run: cargo build -p aperio-server -p aperio-client

      # Real integration test: aperio-server + aperio-client + mock backend,
      # exercising proxying, dashboard APIs, and the programmatic tunnels API.
      - name: Run E2E integration test
        run: bash tests/e2e.sh
